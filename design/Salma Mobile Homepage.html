document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t-size:15px;font-weight:600;line-height:1.5;\">لماذا يسافر الكويتيون للعلاج بالخارج؟<\u002Fdiv><div style=\"font-size:11px;color:#449785;margin-top:5px;\">8 دقائق قراءة<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- LIFESTYLE — صحة وحياة (teal/blush soft lane) -->\n  <div style=\"margin-top:18px;background:linear-gradient(135deg,#eef7f8,#fbeeea);padding:18px 0 20px;\">\n    <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:13px;padding:0 18px;\">\n      <div style=\"width:4px;height:22px;background:#68BBCA;border-radius:3px;\"><\u002Fdiv>\n      <div style=\"font-size:17px;font-weight:700;color:#2E2E2D;\">صحة وحياة<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"salma-scroll\" style=\"display:flex;gap:12px;overflow-x:auto;padding:0 18px;\">\n      <div style=\"width:170px;flex-shrink:0;background:#fff;border-radius:14px;overflow:hidden;\">\n        <div style=\"height:96px;background:repeating-linear-gradient(45deg,#d7eef1,#d7eef1 7px,#c3e4e9 7px,#c3e4e9 14px);\"><\u002Fdiv>\n        <div style=\"padding:11px 12px;font-size:13.5px;font-weight:600;line-height:1.5;\">5 عادات صباحية تحسّن صحتك النفسية<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"width:170px;flex-shrink:0;background:#fff;border-radius:14px;overflow:hidden;\">\n        <div style=\"height:96px;background:repeating-linear-gradient(45deg,#fbe0da,#fbe0da 7px,#f6cdc3 7px,#f6cdc3 14px);\"><\u002Fdiv>\n        <div style=\"padding:11px 12px;font-size:13.5px;font-weight:600;line-height:1.5;\">دليل التغذية في الصيف الخليجي<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"width:170px;flex-shrink:0;background:#fff;border-radius:14px;overflow:hidden;\">\n        <div style=\"height:96px;background:repeating-linear-gradient(45deg,#d7eef1,#d7eef1 7px,#c3e4e9 7px,#c3e4e9 14px);\"><\u002Fdiv>\n        <div style=\"padding:11px 12px;font-size:13.5px;font-weight:600;line-height:1.5;\">تمارين بسيطة تمارسها في المكتب<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- GULF + WORLD digest -->\n  <div style=\"padding:18px 18px 6px;\">\n    <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:6px;\">\n      <div style=\"width:4px;height:22px;background:#449785;border-radius:3px;\"><\u002Fdiv>\n      <div style=\"font-size:17px;font-weight:700;\">الخليج والعالم<\u002Fdiv>\n      <span style=\"font-size:11px;color:#616261;margin-right:auto;\">الأهم فقط<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;\">\n      <div style=\"display:flex;gap:11px;padding:12px 0;border-bottom:1px solid #ECE4D8;align-items:baseline;\">\n        <span style=\"font-size:11px;font-weight:700;color:#449785;font-family:'IBM Plex Sans',sans-serif;flex-shrink:0;\">السعودية<\u002Fspan>\n        <div style=\"font-size:14.5px;font-weight:500;line-height:1.5;\">إطلاق أكبر مدينة طبية متكاملة في الرياض<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:11px;padding:12px 0;border-bottom:1px solid #ECE4D8;align-items:baseline;\">\n        <span style=\"font-size:11px;font-weight:700;color:#449785;font-family:'IBM Plex Sans',sans-serif;flex-shrink:0;\">الإمارات<\u002Fspan>\n        <div style=\"font-size:14.5px;font-weight:500;line-height:1.5;\">نتائج واعدة لعلاج جيني جديد في أبوظبي<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:11px;padding:12px 0;align-items:baseline;\">\n        <span style=\"font-size:11px;font-weight:700;color:#449785;font-family:'IBM Plex Sans',sans-serif;flex-shrink:0;\">العالم<\u002Fspan>\n        <div style=\"font-size:14.5px;font-weight:500;line-height:1.5;\">منظمة الصحة العالمية تحذّر من سلالة إنفلونزا جديدة<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- VOTING — تصويت سلمى -->\n  <div style=\"margin-top:16px;background:#F7EFE6;padding:20px 0 22px;\">\n    <div style=\"padding:0 18px;\">\n      <div style=\"display:flex;align-items:center;gap:9px;\">\n        <div style=\"width:4px;height:24px;background:#3A7C6C;border-radius:3px;\"><\u002Fdiv>\n        <div style=\"font-size:18px;font-weight:700;\">تصويت سلمى<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:13px;color:#616261;margin-top:8px;line-height:1.6;\">الأطباء الأكثر تقديراً — اختيار الجمهور. تصويت شهري، صوت واحد لكل حساب موثّق.<\u002Fdiv>\n    <\u002Fdiv>\n    <!-- specialty tabs -->\n    <div class=\"salma-scroll\" style=\"display:flex;gap:8px;overflow-x:auto;padding:14px 18px 16px;\">\n      <sc-for list=\"{{ specs }}\" as=\"s\" hint-placeholder-count=\"4\">\n        <div onclick=\"{{ s.pick }}\" style=\"{{ s.style }}\">{{ s.label }}<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <!-- candidates -->\n    <div style=\"padding:0 18px;display:flex;flex-direction:column;gap:11px;\">\n      <sc-for list=\"{{ voteList }}\" as=\"c\" hint-placeholder-count=\"3\">\n        <div style=\"background:#fff;border-radius:13px;padding:13px 14px;border:1px solid #ECE4D8;\">\n          <div style=\"display:flex;align-items:center;gap:11px;\">\n            <div style=\"width:42px;height:42px;border-radius:50%;background:repeating-linear-gradient(45deg,#E7CEB5,#E7CEB5 4px,#d8bd9c 4px,#d8bd9c 8px);flex-shrink:0;\"><\u002Fdiv>\n            <div style=\"flex:1;\">\n              <div style=\"font-size:14.5px;font-weight:700;\">{{ c.name }}<\u002Fdiv>\n              <div style=\"font-size:11.5px;color:#616261;margin-top:2px;\">{{ c.hosp }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div onclick=\"{{ c.vote }}\" style=\"{{ c.btnStyle }}\">{{ c.btnLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:11px;display:flex;align-items:center;gap:9px;\">\n            <div style=\"flex:1;height:7px;background:#ECE4D8;border-radius:5px;overflow:hidden;\"><div style=\"height:100%;width:{{ c.pct }};background:#3A7C6C;border-radius:5px;transition:width .4s;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"font-size:12px;font-weight:700;color:#3A7C6C;font-family:'IBM Plex Sans',sans-serif;min-width:34px;text-align:left;\">{{ c.count }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- MISSION / من نحن -->\n  <div style=\"background:#3A7C6C;color:#fff;padding:26px 20px;\">\n    <div style=\"font-size:11px;font-weight:600;letter-spacing:2px;color:#9ecabf;font-family:'IBM Plex Sans',sans-serif;margin-bottom:12px;\">لماذا سلمى ·  WHY SALMA<\u002Fdiv>\n    <div style=\"font-size:22px;font-weight:700;line-height:1.55;\">سلمى تساعدك على حياة أفضل وأكثر صحة.<\u002Fdiv>\n    <div style=\"font-size:14px;line-height:1.75;opacity:.92;margin-top:12px;\">منصة إخبارية صحية مستقلة، من الكويت إلى الخليج — نُغربل العالم لنقدّم لك ما يهمّ صحتك، بمصداقية ومصادر موثوقة.<\u002Fdiv>\n    <div style=\"display:inline-flex;margin-top:18px;background:#fff;color:#3A7C6C;font-size:13px;font-weight:700;padding:11px 18px;border-radius:10px;\">من نحن ←<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- NEWSLETTER + interests -->\n  <div style=\"padding:24px 18px;background:#fff;\">\n    <div style=\"font-size:18px;font-weight:700;text-align:center;\">اختر اهتماماتك واشترك بالنشرة<\u002Fdiv>\n    <div style=\"font-size:12.5px;color:#616261;text-align:center;margin-top:7px;line-height:1.6;\">نُرسل لك الأهم في مجالاتك — أنت تتحكم بما يصلك.<\u002Fdiv>\n    <div style=\"display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0 18px;\">\n      <sc-for list=\"{{ chips }}\" as=\"ch\" hint-placeholder-count=\"8\">\n        <div onclick=\"{{ ch.toggle }}\" style=\"{{ ch.style }}\">{{ ch.label }}<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:8px;\">\n      <input placeholder=\"بريدك الإلكتروني\" dir=\"rtl\" style=\"flex:1;border:1px solid #C3C4C6;border-radius:10px;padding:12px 14px;font-size:14px;font-family:'IBM Plex Sans Arabic',sans-serif;outline:none;\">\n      <div style=\"background:#3A7C6C;color:#fff;font-size:14px;font-weight:700;padding:12px 20px;border-radius:10px;display:flex;align-items:center;\">اشترك<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FOOTER -->\n  <div style=\"background:#2E2E2D;color:#fff;padding:24px 18px 30px;\">\n    <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:16px;\">\n      <div style=\"width:34px;height:34px;border-radius:10px;background:#3A7C6C;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;\">س<\u002Fdiv>\n      <div style=\"font-size:18px;font-weight:700;\">سلمى<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-wrap:wrap;gap:x;gap:14px 22px;font-size:13px;color:#C3C4C6;margin-bottom:18px;\">\n      <span>الكويت<\u002Fspan><span>الخليج<\u002Fspan><span>العالم<\u002Fspan><span>اقتصاد الصحة<\u002Fspan><span>صحة وحياة<\u002Fspan><span>تحقيقات<\u002Fspan><span>من نحن<\u002Fspan><span>اتصل بنا<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"border-top:1px solid #444;padding-top:14px;font-size:11px;color:#8a8a89;line-height:1.7;font-family:'IBM Plex Sans',sans-serif;\">\n      المعايير التحريرية · مصادرنا: WHO · CDC · Mayo Clinic<br>© 2026 سلمى — جميع الحقوق محفوظة\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:12px;margin-top:14px;\">\n      <div style=\"width:32px;height:32px;border-radius:9px;border:1px solid #444;display:flex;align-items:center;justify-content:center;font-size:13px;font-family:'IBM Plex Sans',sans-serif;\">IG<\u002Fdiv>\n      <div style=\"width:32px;height:32px;border-radius:9px;border:1px solid #444;display:flex;align-items:center;justify-content:center;font-size:13px;font-family:'IBM Plex Sans',sans-serif;\">X<\u002Fdiv>\n      <div style=\"width:32px;height:32px;border-radius:9px;border:1px solid #444;display:flex;align-items:center;justify-content:center;font-size:13px;\">▶<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:412,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  containerRef = React.createRef();\n  state = { lang: 'ar', spec: 'قلب', votes: {}, voted: {} };\n\n  componentDidUpdate() {\n    if (this.containerRef.current) {\n      this.containerRef.current.dir = this.state.lang === 'ar' ? 'rtl' : 'ltr';\n    }\n  }\n\n  vote(name) {\n    if (this.state.voted[name]) return;\n    this.setState(s => ({\n      votes: { ...s.votes, [name]: (s.votes[name] || 0) + 1 },\n      voted: { ...s.voted, [name]: true }\n    }));\n  }\n\n  renderVals() {\n    const isAr = this.state.lang === 'ar';\n\n    const arBtnStyle = { padding: '6px 9px', background: isAr ? '#3A7C6C' : '#fff', color: isAr ? '#fff' : '#616261' };\n    const enBtnStyle = { padding: '6px 9px', background: !isAr ? '#3A7C6C' : '#fff', color: !isAr ? '#fff' : '#616261', fontFamily: \"'IBM Plex Sans',sans-serif\" };\n\n    const doctors = [\n      { name: 'د. أحمد العنزي', spec: 'قلب وأوعية دموية', from: 'مبارك الكبير', to: 'دار الشفاء', when: 'قبل يومين' },\n      { name: 'د. نورة الصباح', spec: 'نساء وولادة', from: 'الأميري', to: 'رويال حياة', when: 'قبل 3 أيام' },\n      { name: 'د. يوسف الرشيد', spec: 'جراحة عظام', from: 'العدان', to: 'السلام الدولي', when: 'قبل أسبوع' },\n      { name: 'د. مريم الفهد', spec: 'جلدية', from: 'الجهراء', to: 'عيادة طيبة', when: 'قبل أسبوع' }\n    ];\n\n    const videos = [\n      { title: 'ما الفرق بين النوبة القلبية والسكتة الدماغية؟', len: '3:12' },\n      { title: 'مقابلة: مستقبل زراعة الأعضاء في الكويت', len: '8:45' },\n      { title: 'كيف تقرأ نتائج تحليل الدم؟ — حلقة جديدة', len: '5:30' }\n    ];\n\n    const tabStyle = (on) => ({\n      flexShrink: 0, padding: '8px 16px', borderRadius: '20px', fontSize: '13px', fontWeight: 600, cursor: 'pointer',\n      background: on ? '#3A7C6C' : '#fff', color: on ? '#fff' : '#616261', border: '1px solid ' + (on ? '#3A7C6C' : '#ECE4D8')\n    });\n    const specNames = ['قلب', 'عظام', 'أطفال', 'جلدية'];\n    const specs = specNames.map(s => ({ label: s, style: tabStyle(s === this.state.spec), pick: () => this.setState({ spec: s }) }));\n\n    const candidates = {\n      'قلب': [\n        { name: 'د. أحمد العنزي', hosp: 'مستشفى مبارك الكبير', base: 342 },\n        { name: 'د. سارة الخالدي', hosp: 'مستشفى دار الشفاء', base: 318 },\n        { name: 'د. فهد العتيبي', hosp: 'مركز جابر الأحمد', base: 297 }\n      ],\n      'عظام': [\n        { name: 'د. يوسف الرشيد', hosp: 'مستشفى السلام الدولي', base: 276 },\n        { name: 'د. ليلى المنصور', hosp: 'مستشفى العدان', base: 254 },\n        { name: 'د. بدر الدوسري', hosp: 'مستشفى الأميري', base: 231 }\n      ],\n      'أطفال': [\n        { name: 'د. هند الصالح', hosp: 'مستشفى الأميري', base: 401 },\n        { name: 'د. عمر القلاف', hosp: 'مستشفى مبارك الكبير', base: 365 },\n        { name: 'د. منى الرشيدي', hosp: 'مستشفى الفروانية', base: 340 }\n      ],\n      'جلدية': [\n        { name: 'د. مريم الفهد', hosp: 'عيادة طيبة التخصصية', base: 289 },\n        { name: 'د. طلال السعيد', hosp: 'مركز رويال حياة', base: 263 },\n        { name: 'د. دلال العجمي', hosp: 'مستشفى دار الشفاء', base: 245 }\n      ]\n    };\n    const list = (candidates[this.state.spec] || []).map(c => ({ ...c, count: c.base + (this.state.votes[c.name] || 0) }));\n    const max = Math.max(...list.map(c => c.count), 1);\n    const voteList = list.map(c => {\n      const voted = !!this.state.voted[c.name];\n      return {\n        name: c.name, hosp: c.hosp, count: c.count, pct: Math.round((c.count / max) * 100) + '%',\n        vote: () => this.vote(c.name),\n        btnLabel: voted ? '✓ صوّتت' : 'صوّت',\n        btnStyle: {\n          fontSize: '12.5px', fontWeight: 700, padding: '8px 15px', borderRadius: '9px', cursor: voted ? 'default' : 'pointer',\n          background: voted ? '#ECE4D8' : '#3A7C6C', color: voted ? '#449785' : '#fff', flexShrink: 0\n        }\n      };\n    });\n\n    const chipNames = ['قلب وأوعية', 'عظام', 'أطفال', 'جلدية', 'تغذية', 'صحة نفسية', 'لياقة', 'اقتصاد الصحة', 'تحقيقات'];\n    const chips = chipNames.map(label => {\n      const on = !!this.state.voted['__chip_' + label] || !!(this.state.chips && this.state.chips[label]);\n      return {\n        label,\n        toggle: () => this.setState(s => ({ chips: { ...(s.chips || {}), [label]: !((s.chips || {})[label]) } })),\n        style: {\n          padding: '8px 15px', borderRadius: '20px', fontSize: '13px', fontWeight: 600, cursor: 'pointer',\n          background: on ? '#3A7C6C' : '#F7EFE6', color: on ? '#fff' : '#616261',\n          border: '1px solid ' + (on ? '#3A7C6C' : '#E7CEB5')\n        }\n      };\n    });\n\n    return {\n      containerRef: this.containerRef,\n      isAr,\n      toggleLang: () => this.setState(s => ({ lang: s.lang === 'ar' ? 'en' : 'ar' })),\n      arBtnStyle, enBtnStyle,\n      doctors, videos, specs, voteList, chips\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
